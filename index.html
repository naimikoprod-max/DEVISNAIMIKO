<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naimiko Prod — Estimation de devis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F172A;color:#F8FAFC;min-height:100vh}
.app{max-width:580px;margin:0 auto;padding:0 20px 60px}
.hdr{padding:36px 0 28px;text-align:center}
.hdr-name{font-family:Georgia,serif;font-size:22px;font-weight:400;color:#8B5CF6;letter-spacing:0.04em;margin-bottom:2px}
.hdr-sub{font-size:11px;color:#64748B;letter-spacing:0.12em;text-transform:uppercase}
.prog{display:flex;gap:4px;margin-bottom:36px}.prog-i{flex:1}
.prog-bar{height:2px;background:#1E293B;margin-bottom:6px;transition:all 0.4s}
.prog-bar.on{background:#8B5CF6}.prog-bar.done{background:#E91E8C}
.prog-lbl{font-size:10px;color:#475569;letter-spacing:0.06em}
.prog-lbl.cur{color:#8B5CF6}.prog-lbl.dn{color:#94A3B8}
h2{font-family:Georgia,serif;font-size:26px;font-weight:400;color:#F8FAFC;margin-bottom:8px}
.intro{font-size:14px;color:#64748B;margin-bottom:32px;line-height:1.7}
.card{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:20px;cursor:pointer;transition:all 0.2s;margin-bottom:10px}
.card:hover{border-color:#8B5CF644}.card.sel{border-color:#8B5CF6;box-shadow:0 0 0 1px #8B5CF633}
.card .icon{font-size:24px;margin-bottom:10px;display:block}
.card .name{font-size:15px;font-weight:600;margin-bottom:3px}.card.sel .name{color:#8B5CF6}
.card .desc{font-size:12px;color:#64748B;line-height:1.5}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.lbl{font-size:10px;font-weight:700;color:#475569;letter-spacing:0.14em;text-transform:uppercase;margin:28px 0 12px}
.q-title{font-family:Georgia,serif;font-size:17px;color:#F8FAFC;margin-bottom:6px;font-weight:400;font-style:italic}
.q-sub{font-size:12px;color:#64748B;margin-bottom:14px;line-height:1.5}
.ch{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:all 0.15s}
.ch:hover{border-color:#8B5CF644}.ch.sel{border-color:#8B5CF6}
.ch-i{font-size:20px;flex-shrink:0}.ch-b{flex:1}
.ch-n{font-size:14px;font-weight:500}.ch.sel .ch-n{color:#8B5CF6}
.ch-d{font-size:12px;color:#64748B;margin-top:2px;line-height:1.4}
.ch-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid #475569;flex-shrink:0;position:relative;transition:all 0.15s}
.ch-dot::after{content:'';width:8px;height:8px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none}
.ch-dot.on{border-color:#8B5CF6}.ch-dot.on::after{display:block;background:#8B5CF6}
.tgl{background:#1E293B;border:1px solid #334155;border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:8px;transition:all 0.15s}
.tgl:hover{border-color:#8B5CF644}.tgl.on{border-color:#8B5CF6}
.tgl-i{font-size:20px;flex-shrink:0}.tgl-b{flex:1}
.tgl-n{font-size:14px;font-weight:500}.tgl.on .tgl-n{color:#8B5CF6}
.tgl-d{font-size:12px;color:#64748B;margin-top:2px}
.tgl-p{font-size:13px;font-weight:600;color:#475569;white-space:nowrap}.tgl.on .tgl-p{color:#8B5CF6}
.tgl-x{width:20px;height:20px;border-radius:50%;border:1.5px solid #475569;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all 0.15s}
.tgl-x.on{background:#8B5CF6;border-color:#8B5CF6;color:#0F172A}
.phr{display:flex;gap:8px;margin:8px 0 8px 16px}
.phr button{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:#0F172A;border:1px solid #334155;color:#94A3B8}
.phr button.on{border-color:#E91E8C;color:#E91E8C}
.cdr{display:flex;gap:6px;margin:8px 0 8px 16px}
.cdr button{flex:1;padding:8px 2px;border-radius:10px;font-size:11px;cursor:pointer;background:#0F172A;border:1px solid #334155;color:#94A3B8;text-align:center;line-height:1.3}
.cdr button.on{border-color:#8B5CF6;color:#8B5CF6}
.dn{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:12px 16px;font-size:12px;color:#64748B;margin-bottom:8px;display:flex;gap:8px;line-height:1.5}
.dr{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;transition:all 0.15s}
.dr:hover{border-color:#8B5CF644}.dr.sel{border-color:#8B5CF6}
.dr .dl{font-size:13px}.dr .dp{font-size:12px;font-weight:600;color:#475569}.dr.sel .dp{color:#8B5CF6}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;background:#1E293B;border:1px solid #334155;color:#94A3B8}
.tag.on{border-color:#E91E8C;color:#E91E8C;background:#E91E8C11}
.hint{background:#8B5CF611;border:1px solid #8B5CF633;border-radius:12px;padding:12px 16px;font-size:12px;color:#8B5CF6;margin-top:14px;line-height:1.5}
.nav{display:flex;gap:10px;margin-top:36px}
.b-back{flex:1;padding:14px;background:transparent;border:1px solid #334155;border-radius:4px;color:#64748B;cursor:pointer;font-size:13px;font-family:inherit}
.b-next{flex:2;padding:14px;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.b-next.go{background:#8B5CF6;color:#F8FAFC}.b-next.gen{background:linear-gradient(135deg,#8B5CF6,#E91E8C);color:#F8FAFC}
.b-next:disabled{background:#1E293B;color:#334155;cursor:not-allowed}
.res-hero{background:linear-gradient(160deg,#1E293B,#0F172A);border:1px solid #8B5CF644;border-radius:16px;padding:32px 24px;text-align:center;margin-bottom:16px}
.res-tag{font-size:10px;color:#64748B;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.res-price{font-size:56px;font-weight:700;color:#F8FAFC;line-height:1;margin-bottom:4px}
.res-ttc{font-size:12px;color:#64748B;margin-bottom:14px}
.res-range{display:inline-block;padding:6px 16px;background:#8B5CF611;border:1px solid #8B5CF633;border-radius:4px;font-size:12px;color:#8B5CF6}
.rc{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:18px 20px;margin-bottom:12px}
.rc-hd{font-size:10px;font-weight:700;color:#475569;letter-spacing:0.12em;text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid #334155}
.rc-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1E293B33}
.rc-line:last-child{border-bottom:none}
.rc-line .rl{font-size:13px;font-weight:500}.rc-line .rs{font-size:11px;color:#64748B}
.rc-line .rp{font-size:14px;font-weight:600;color:#8B5CF6;white-space:nowrap;margin-left:10px}
.conseil{border-left:2px solid #8B5CF6;padding:12px 16px;margin-bottom:14px;background:#1E293B;border-radius:0 12px 12px 0}
.conseil-l{font-size:10px;font-weight:700;color:#8B5CF6;letter-spacing:0.1em;margin-bottom:4px}
.conseil-t{font-size:13px;color:#94A3B8;line-height:1.6}
.cta{background:linear-gradient(135deg,#1E293B,#0F172A);border:1px solid #8B5CF644;border-radius:16px;padding:22px;margin-bottom:12px}
.cta-title{font-family:Georgia,serif;font-size:20px;color:#F8FAFC;margin-bottom:4px}
.cta-sub{font-size:13px;color:#64748B;margin-bottom:18px;line-height:1.6}
.field{margin-bottom:10px}
.field label{font-size:10px;color:#475569;display:block;margin-bottom:5px;letter-spacing:0.1em;text-transform:uppercase}
.field input,.field textarea{width:100%;padding:12px 14px;background:#0F172A;border:1px solid #334155;border-radius:4px;color:#F8FAFC;font-size:13px;font-family:inherit}
.field input:focus,.field textarea:focus{outline:none;border-color:#8B5CF6}
.field textarea{min-height:56px;resize:vertical}
.b-send{width:100%;padding:14px;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;background:#8B5CF6;color:#F8FAFC;margin-top:6px}
.b-send:disabled{background:#1E293B;color:#334155;cursor:not-allowed}
.ok-box{background:#1E293B;border:1px solid #8B5CF644;border-radius:16px;padding:28px;text-align:center;margin-bottom:12px}
.ok-title{font-family:Georgia,serif;font-size:20px;color:#8B5CF6;margin-bottom:6px}
.ok-text{font-size:13px;color:#64748B;line-height:1.7}
.b-reset{width:100%;padding:12px;background:transparent;border:1px solid #334155;border-radius:4px;color:#475569;cursor:pointer;font-size:12px;margin-top:4px}
.spinner-wrap{text-align:center;padding:50px 20px}
.spinner{width:30px;height:30px;border:2px solid #334155;border-top-color:#8B5CF6;border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
<div class="hdr"><div class="hdr-name">Naimiko Prod</div><div class="hdr-sub">Estimation de devis</div></div>
<div class="prog" id="prog"></div>
<div id="c"></div>
</div>
<script>
var ST=[{id:1,l:'Projet'},{id:2,l:'Votre besoin'},{id:3,l:'Le rendu'},{id:4,l:'Finalisation'}];
var CADR=[{id:'0.5',l:'demi j.',p:280},{id:'1',l:'1 j.',p:549},{id:'1.5',l:'1.5 j.',p:829},{id:'2',l:'2 j.',p:1099},{id:'3',l:'3 j.',p:1649}];

var S={step:1,ptype:'',desc:'',duree:'',nbVideos:'1',lieux:'',contenu:'',style:'',soustitres:false,drone:false,photo:false,photoH:'2',cadreur:false,cadreurDur:'0.5',photoDur:'2',photoStyle:'',dist:'',deliv:[],result:null,contactSent:false,loading:false,ct:{name:'',email:'',phone:'',msg:''}};

function isPhoto(){return S.ptype==='photo';}
function canNext(){
  if(S.step===1)return !!S.ptype;
  if(S.step===2){if(isPhoto())return !!S.photoDur;return !!S.duree&&!!S.contenu;}
  if(S.step===3){if(isPhoto())return true;return !!S.style;}
  return true;
}
function estimerTournage(){
  var d=S.duree,l=S.lieux||'1',n=S.nbVideos||'1';
  var base='1 journee';
  if(d==='tres_court')base='une demi-journee';
  else if(d==='court'&&l==='1')base='une demi-journee a 1 journee';
  else if(d==='court')base='1 journee';
  else if(d==='moyen'&&l==='1')base='1 journee';
  else if(d==='moyen')base='1 a 2 journees';
  else if(d==='long'&&l==='1')base='1 a 2 journees';
  else if(d==='long')base='2 a 3 journees';
  if(n==='3'||n==='5+')base=base+' (voire plus selon le nombre de videos)';
  return base;
}

function render(){
  rProg();
  var c=document.getElementById('c');
  var nb=document.getElementById('nb');if(nb)nb.remove();
  if(S.loading){c.innerHTML='<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:13px;color:#64748B;font-style:italic">Claude analyse votre projet...</p></div>';return;}
  if(S.step===5){rResult(c);return;}
  if(S.step===1)r1(c);if(S.step===2)r2(c);if(S.step===3)r3(c);if(S.step===4)r4(c);
  rNav();
}

function rProg(){
  if(S.step>=5){document.getElementById('prog').innerHTML='';return;}
  var h='';
  for(var i=0;i<ST.length;i++){
    var s=ST[i];
    var bc=s.id<S.step?'done':s.id===S.step?'on':'';
    var lc=s.id<S.step?'dn':s.id===S.step?'cur':'';
    h+='<div class="prog-i"><div class="prog-bar '+bc+'"></div><div class="prog-lbl '+lc+'">'+s.l+'</div></div>';
  }
  document.getElementById('prog').innerHTML=h;
}

function choiceRow(val,cur,icon,name,desc){
  return '<div class="ch'+(cur===val?' sel':'')+'" onclick="'+cur+'=\''+val+'\';render()"><span class="ch-i">'+icon+'</span><div class="ch-b"><div class="ch-n">'+name+'</div><div class="ch-d">'+desc+'</div></div><div class="ch-dot'+(cur===val?' on':'')+'"></div></div>';
}

function r1(c){
  var types=[
    ['entreprise','🏢','Entreprise','Institutionnel, corporate, interne'],
    ['evenement','🎪','Événement','Festival, salon, inauguration'],
    ['tourisme','🏔️','Tourisme / Territoire','Office, patrimoine, destination'],
    ['reseaux','📱','Réseaux sociaux','Capsules, reels, TikTok'],
    ['photo','📷','Photo','Reportage, portraits, produit'],
    ['autre','🎬','Autre','Pub, clip, documentaire']
  ];
  var h='<h2>Quel est votre projet ?</h2><p class="intro">Choisissez la catégorie qui correspond le mieux.</p><div class="grid-2">';
  for(var i=0;i<types.length;i++){
    var t=types[i];
    h+='<div class="card'+(S.ptype===t[0]?' sel':'')+'" onclick="S.ptype=\''+t[0]+'\';render()"><span class="icon">'+t[1]+'</span><div class="name">'+t[2]+'</div><div class="desc">'+t[3]+'</div></div>';
  }
  h+='</div>';
  h+='<div style="background:#1E293B;border:1px solid #334155;border-radius:16px;padding:16px;margin-top:14px"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Décrivez votre projet en quelques mots</div><textarea style="width:100%;min-height:80px;background:#0F172A;border:1px solid #334155;border-radius:4px;color:#F8FAFC;padding:12px;font-size:13px;font-family:inherit;resize:vertical" placeholder="Ex : Vidéo de 2 min pour notre domaine viticole. Interview du gérant + images drone." oninput="S.desc=this.value">'+S.desc+'</textarea></div>';
  c.innerHTML=h;
}

function r2(c){
  var h='<h2>De quoi avez-vous besoin ?</h2><p class="intro">Répondez simplement — on calcule tout pour vous.</p>';

  if(isPhoto()){
    h+='<div class="q-title">Durée de la séance</div><div class="q-sub">On adapte la présence du photographe.</div>';
    var pd=[['courte','⚡','Séance courte','1 à 2 heures'],['demij','📷','Demi-journée','3 à 4 heures'],['journee','🌅','Journée','6 à 8 heures']];
    for(var i=0;i<pd.length;i++){var d=pd[i];h+='<div class="ch'+(S.photoDur===d[0]?' sel':'')+'" onclick="S.photoDur=\''+d[0]+'\';render()"><span class="ch-i">'+d[1]+'</span><div class="ch-b"><div class="ch-n">'+d[2]+'</div><div class="ch-d">'+d[3]+'</div></div><div class="ch-dot'+(S.photoDur===d[0]?' on':'')+'"></div></div>';}
    h+='<div class="lbl">Type de shooting</div>';
    var ps=[['reportage','📸','Reportage'],['portrait','🧑','Portraits'],['produit','📦','Produit'],['nature','🏔️','Nature / Tourisme']];
    h+='<div class="grid-2">';
    for(var i=0;i<ps.length;i++){var p=ps[i];h+='<div class="card'+(S.photoStyle===p[0]?' sel':'')+'" onclick="S.photoStyle=\''+p[0]+'\';render()"><span class="icon">'+p[1]+'</span><div class="name">'+p[2]+'</div></div>';}
    h+='</div>';
    c.innerHTML=h;return;
  }

  // FORMAT VIDEO
  h+='<div class="q-title">Quel format de vidéo ?</div><div class="q-sub">La durée de chaque vidéo finale — pas du tournage.</div>';
  var dur=[['tres_court','⚡','Clip court','30s à 1 min — reel, teaser'],['court','🎬','Film court','1 à 3 min — présentation, promo'],['moyen','🎥','Film moyen','3 à 7 min — institutionnel, aftermovie'],['long','🎞️','Film long','7 à 15 min — documentaire, reportage']];
  for(var i=0;i<dur.length;i++){var d=dur[i];h+='<div class="ch'+(S.duree===d[0]?' sel':'')+'" onclick="S.duree=\''+d[0]+'\';render()"><span class="ch-i">'+d[1]+'</span><div class="ch-b"><div class="ch-n">'+d[2]+'</div><div class="ch-d">'+d[3]+'</div></div><div class="ch-dot'+(S.duree===d[0]?' on':'')+'"></div></div>';}

  // NOMBRE DE VIDEOS
  h+='<div class="lbl">Combien de vidéos ?</div><div class="q-sub">Un seul film ou plusieurs contenus ?</div>';
  var nbv=[['1','1️⃣','Une seule vidéo','Un film unique'],['2','2️⃣','2 vidéos','2 capsules ou 1 film + 1 teaser'],['3','3️⃣','3 vidéos','Pack réseaux sociaux'],['5+','🔥','5 vidéos et plus','Campagne multi-contenus']];
  for(var i=0;i<nbv.length;i++){var n=nbv[i];h+='<div class="ch'+(S.nbVideos===n[0]?' sel':'')+'" onclick="S.nbVideos=\''+n[0]+'\';render()"><span class="ch-i">'+n[1]+'</span><div class="ch-b"><div class="ch-n">'+n[2]+'</div><div class="ch-d">'+n[3]+'</div></div><div class="ch-dot'+(S.nbVideos===n[0]?' on':'')+'"></div></div>';}

  // CONTENU
  h+='<div class="lbl">Quel type de contenu ?</div><div class="q-sub">Ce que vous imaginez filmer.</div>';
  var cnt=[['interview','🎙️','Interview + illustrations','Personnes qui parlent, plans de coupe'],['ambiance','🌊','Images ambiance','Lieu, événement, atmosphère'],['mixte','🔀','Les deux','Interview et ambiance'],['autre_contenu','💡','Je ne sais pas encore','On adaptera ensemble']];
  for(var i=0;i<cnt.length;i++){var x=cnt[i];h+='<div class="ch'+(S.contenu===x[0]?' sel':'')+'" onclick="S.contenu=\''+x[0]+'\';render()"><span class="ch-i">'+x[1]+'</span><div class="ch-b"><div class="ch-n">'+x[2]+'</div><div class="ch-d">'+x[3]+'</div></div><div class="ch-dot'+(S.contenu===x[0]?' on':'')+'"></div></div>';}

  // LIEUX
  h+='<div class="lbl">Combien de lieux ?</div><div class="q-sub">Influence le temps de tournage.</div>';
  var lx=[['1','📍','Un seul lieu','Tout au même endroit'],['2_3','📍','2 à 3 lieux','Plusieurs spots'],['4+','🗺️','4 lieux et plus','Territoire étendu']];
  for(var i=0;i<lx.length;i++){var l=lx[i];h+='<div class="ch'+(S.lieux===l[0]?' sel':'')+'" onclick="S.lieux=\''+l[0]+'\';render()"><span class="ch-i">'+l[1]+'</span><div class="ch-b"><div class="ch-n">'+l[2]+'</div><div class="ch-d">'+l[3]+'</div></div><div class="ch-dot'+(S.lieux===l[0]?' on':'')+'"></div></div>';}

  // OPTIONS TOURNAGE
  h+='<div class="lbl">Options de tournage</div>';
  h+='<div class="tgl'+(S.drone==='rural'?' on':'')+'" onclick="S.drone=S.drone===\'rural\'?false:\'rural\';render()"><span class="tgl-i">🌿</span><div class="tgl-b"><div class="tgl-n">Drone — zone rurale</div><div class="tgl-d">Espace dégagé</div></div><span class="tgl-p">149 € HT</span><div class="tgl-x'+(S.drone==='rural'?' on':'')+'">✓</div></div>';
  h+='<div class="tgl'+(S.drone==='urbain'?' on':'')+'" onclick="S.drone=S.drone===\'urbain\'?false:\'urbain\';render()"><span class="tgl-i">🏙️</span><div class="tgl-b"><div class="tgl-n">Drone — zone réglementée</div><div class="tgl-d">Agglomération, militaire, rassemblement</div></div><span class="tgl-p">249 € HT</span><div class="tgl-x'+(S.drone==='urbain'?' on':'')+'">✓</div></div>';
  h+='<div class="tgl'+(S.photo?' on':'')+'" onclick="S.photo=!S.photo;render()"><span class="tgl-i">📷</span><div class="tgl-b"><div class="tgl-n">Photographie</div><div class="tgl-d">Captation + retouches</div></div><span class="tgl-p">97 € HT/h</span><div class="tgl-x'+(S.photo?' on':'')+'">✓</div></div>';
  if(S.photo){
    h+='<div class="phr">';
    var hrs=['1','2','3','4'];
    for(var i=0;i<hrs.length;i++){h+='<button class="'+(S.photoH===hrs[i]?'on':'')+'" onclick="S.photoH=\''+hrs[i]+'\';render()">'+hrs[i]+'h</button>';}
    h+='</div>';
  }
  h+='<div class="tgl'+(S.cadreur?' on':'')+'" onclick="S.cadreur=!S.cadreur;render()"><span class="tgl-i">🎥</span><div class="tgl-b"><div class="tgl-n">Cadreur supplémentaire</div><div class="tgl-d">Second opérateur</div></div><span class="tgl-p">280 € HT/½j</span><div class="tgl-x'+(S.cadreur?' on':'')+'">✓</div></div>';
  if(S.cadreur){
    h+='<div class="cdr">';
    for(var i=0;i<CADR.length;i++){var cd=CADR[i];h+='<button class="'+(S.cadreurDur===cd.id?'on':'')+'" onclick="S.cadreurDur=\''+cd.id+'\';render()">'+cd.l+'<br><span style="font-size:10px">'+cd.p+'€</span></button>';}
    h+='</div>';
  }

  // HINT
  if(S.duree&&S.contenu){
    h+='<div class="hint">💡 On estime environ <strong>'+estimerTournage()+'</strong> de tournage'+(S.nbVideos!=='1'?' pour '+S.nbVideos+' vidéos':'')+'. Estimation affinée à la fin.</div>';
  }
  c.innerHTML=h;
}

function r3(c){
  var h='';
  if(isPhoto()){
    h='<h2>Livraison</h2><p class="intro">Comment souhaitez-vous recevoir vos photos ?</p><div class="lbl">Formats</div><div class="tags">';
    var dO=['Photos HD web','Format réseaux','Impression grand format','Portraits individuels'];
    for(var i=0;i<dO.length;i++){h+='<button class="tag'+(S.deliv.indexOf(dO[i])>=0?' on':'')+'" onclick="toggleD(\''+dO[i]+'\')">'+dO[i]+'</button>';}
    h+='</div>';c.innerHTML=h;return;
  }
  h='<h2>Le rendu de votre film</h2><p class="intro">Quel niveau de finition souhaitez-vous ?</p>';
  h+='<div class="q-title">Le style de montage</div><div class="q-sub">Détermine le temps et le soin apporté en post-production.</div>';
  var st=[['essentiel','✂️','Propre et efficace','Montage clair, musique, titres — contenu informatif ou sobre'],['dynamique','⚡','Dynamique et moderne','Rythme soutenu, transitions, étalonnage travaillé — rendu engageant'],['cinema','🎬','Cinématique et premium','Motion design, ambiance soignée, haut de gamme — pour marquer les esprits']];
  for(var i=0;i<st.length;i++){var s=st[i];h+='<div class="ch'+(S.style===s[0]?' sel':'')+'" onclick="S.style=\''+s[0]+'\';render()"><span class="ch-i">'+s[1]+'</span><div class="ch-b"><div class="ch-n">'+s[2]+'</div><div class="ch-d">'+s[3]+'</div></div><div class="ch-dot'+(S.style===s[0]?' on':'')+'"></div></div>';}
  h+='<div class="lbl" style="margin-top:24px">Option</div>';
  h+='<div class="tgl'+(S.soustitres?' on':'')+'" onclick="S.soustitres=!S.soustitres;render()"><span class="tgl-i">💬</span><div class="tgl-b"><div class="tgl-n">Sous-titres incrustés</div><div class="tgl-d">Indispensable pour les réseaux</div></div><div class="tgl-x'+(S.soustitres?' on':'')+'">✓</div></div>';
  c.innerHTML=h;
}

function r4(c){
  var dO=isPhoto()?['Photos HD web','Format réseaux','Impression']:['Film 16:9 web','Format 9:16 réseaux','Teaser 30s','Photos HD'];
  var h='<h2>Finalisation</h2><p class="intro">Déplacement et formats de livraison.</p>';
  h+='<div class="lbl">Déplacement</div>';
  h+='<div class="dn"><span>✦</span><span>Les trajets de moins de 50 km sont inclus.</span></div>';
  h+='<div class="dr'+(S.dist==='mid'?' sel':'')+'" onclick="S.dist=\'mid\';render()"><span class="dl">50 à 100 km</span><span class="dp">49 € HT</span></div>';
  h+='<div class="dr'+(S.dist==='long'?' sel':'')+'" onclick="S.dist=\'long\';render()"><span class="dl">100 à 200 km</span><span class="dp">89 € HT</span></div>';
  h+='<div class="dr'+(S.dist==='vlong'?' sel':'')+'" onclick="S.dist=\'vlong\';render()"><span class="dl">200 km et plus</span><span class="dp">Sur devis</span></div>';
  h+='<div class="lbl">Formats de livraison</div><div class="tags">';
  for(var i=0;i<dO.length;i++){h+='<button class="tag'+(S.deliv.indexOf(dO[i])>=0?' on':'')+'" onclick="toggleD(\''+dO[i]+'\')">'+dO[i]+'</button>';}
  h+='</div>';
  c.innerHTML=h;
}

function toggleD(v){var i=S.deliv.indexOf(v);if(i>=0)S.deliv.splice(i,1);else S.deliv.push(v);render();}

function rNav(){
  var nb=document.createElement('div');nb.id='nb';nb.className='nav';
  if(S.step>1){var b=document.createElement('button');b.className='b-back';b.textContent='← Retour';b.onclick=function(){S.step--;render();};nb.appendChild(b);}
  var ok=canNext();var isLast=S.step>=4;
  var n=document.createElement('button');
  n.className=isLast?'b-next gen':'b-next go';n.disabled=!ok;
  n.textContent=isLast?'Voir mon estimation →':'Continuer →';
  n.onclick=isLast?doGen:function(){S.step++;render();};
  nb.appendChild(n);document.querySelector('.app').appendChild(nb);
}

function doGen(){
  S.loading=true;render();
  var prompt;
  if(isPhoto()){
    prompt='Tu es assistant devis NAIMIKO PROD (Ardèche). TARIFS PHOTO: 97 euros/h retouches incluses | demi-journee(4h)=389 euros | journee(8h)=749 euros | Deplacement moins50km=inclus/50-100=49 euros/100-200=89 euros/plus200=sur devis | TVA 20%. PROJET PHOTO: duree='+S.photoDur+' type='+(S.photoStyle||'reportage')+' desc="'+(S.desc||'')+'" deplacement='+(S.dist==='mid'?'49 euros':S.dist==='long'?'89 euros':S.dist==='vlong'?'sur devis':'inclus')+' livrables="'+S.deliv.join(',')+'"';
  } else {
    var cadrInfo=S.cadreur?'Oui '+CADR.filter(function(d){return d.id===S.cadreurDur;})[0].p+' euros':'Non';
    prompt='Tu es assistant devis NAIMIKO PROD (Ardèche). TARIFS HT: Tournage demij=349/1j=649/1.5j=949/2j=1249/3j=1749 euros (materiel inclus) | Cadreur supp demij=280/1j=549 euros | Post-prod 247 euros/dj (ratio 1:1 avec tournage) | Montage essentiel=+0.25dj bonus | dynamique=+0.5dj | cinema=+1dj | Sous-titres 125 euros | Drone rural=149/urbain=249 euros | Photo 97 euros/h | Deplacement moins50km=inclus/50-100=49/100-200=89/plus200=sur devis | TVA 20%. REGLES: Estime le TOURNAGE selon: duree film='+S.duree+' | nb videos='+S.nbVideos+' | contenu='+S.contenu+' | lieux='+(S.lieux||'1')+'. Film tres court=demij. Court 1lieu=demij a 1j. Court multi=1j. Moyen 1lieu=1j. Moyen multi=1.5 a 2j. Long=2 a 3j. Si plusieurs videos: multiplier postprod mais mutualiser tournage. PROJET: type='+S.ptype+' | duree_film='+S.duree+' | nb_videos='+S.nbVideos+' | contenu='+S.contenu+' | lieux='+(S.lieux||'1')+' | style='+S.style+' | soustitres='+S.soustitres+' | drone='+(S.drone==='rural'?'rural 149 euros':S.drone==='urbain'?'urbain 249 euros':'Non')+' | photo='+(S.photo?S.photoH+'h':'Non')+' | cadreur='+cadrInfo+' | deplacement='+(S.dist==='mid'?'49 euros':S.dist==='long'?'89 euros':S.dist==='vlong'?'sur devis':'inclus')+' | livrables="'+S.deliv.join(',')+'" | desc="'+(S.desc||'')+'"';
  }
  prompt+='. Reponds UNIQUEMENT en JSON valide sans markdown: {"resume":"2 phrases","lignes":[{"label":"...","detail":"...","ht":0}],"sous_total_ht":0,"tva":0,"total_ttc":0,"fourchette_basse":0,"fourchette_haute":0,"conseil":"1 conseil concret"}';

  fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,messages:[{role:'user',content:prompt}]})})
  .then(function(res){return res.json();})
  .then(function(data){
    if(data.error)throw new Error(data.error.message||JSON.stringify(data));
    var txt='';
    if(data.content){for(var i=0;i<data.content.length;i++){txt+=(data.content[i].text||'');}}
    txt=txt.replace(/```json/g,'').replace(/```/g,'').trim();
    S.result=JSON.parse(txt);S.step=5;
  })
  .catch(function(e){alert('Erreur: '+e.message);})
  .finally(function(){S.loading=false;render();});
}

function rResult(c){
  var r=S.result;
  function fmt(n){return n?n.toLocaleString('fr-FR'):'—';}
  var lines='';
  if(r.lignes){for(var i=0;i<r.lignes.length;i++){var l=r.lignes[i];lines+='<div class="rc-line"><div><div class="rl">'+l.label+'</div>'+(l.detail?'<div class="rs">'+l.detail+'</div>':'')+'</div><div class="rp">'+(l.ht>0?fmt(l.ht)+' € HT':'Inclus')+'</div></div>';}}
  var cta;
  if(S.contactSent){
    cta='<div class="ok-box"><div style="font-size:28px;margin-bottom:10px">✦</div><div class="ok-title">Demande envoyée</div><div class="ok-text">Merci <strong>'+S.ct.name+'</strong> !<br>Korentin vous recontactera à <strong style="color:#8B5CF6">'+S.ct.email+'</strong>.</div></div>';
  } else {
    cta='<div class="cta"><div class="cta-title">Ce devis vous intéresse ?</div><div class="cta-sub">Laissez vos coordonnées — Korentin vous recontacte rapidement.</div><div class="field"><label>Nom *</label><input type="text" placeholder="Prénom Nom ou Société" value="'+S.ct.name+'" oninput="S.ct.name=this.value;rb()"></div><div class="field"><label>Email *</label><input type="email" placeholder="votre@email.com" value="'+S.ct.email+'" oninput="S.ct.email=this.value;rb()"></div><div class="field"><label>Téléphone</label><input type="tel" placeholder="06 xx xx xx xx" value="'+S.ct.phone+'" oninput="S.ct.phone=this.value"></div><div class="field"><label>Message</label><textarea placeholder="Date, lieu, précisions…" oninput="S.ct.msg=this.value">'+S.ct.msg+'</textarea></div><button class="b-send" id="bsend" onclick="doSend()" '+(S.ct.name&&S.ct.email?'':'disabled')+'>Envoyer ma demande</button></div>';
  }
  c.innerHTML='<div class="res-hero"><div class="res-tag">Estimation pour votre projet</div><div class="res-price">'+fmt(r.total_ttc)+' €</div><div class="res-ttc">TTC · dont '+fmt(r.tva)+' € de TVA</div><div class="res-range">Fourchette : '+fmt(r.fourchette_basse)+' € — '+fmt(r.fourchette_haute)+' € TTC</div></div><div class="rc"><div class="rc-hd">Détail</div>'+lines+'</div>'+(r.conseil?'<div class="conseil"><div class="conseil-l">CONSEIL</div><div class="conseil-t">'+r.conseil+'</div></div>':'')+cta+'<button class="b-reset" onclick="raz()">← Nouvelle estimation</button>';
}

function rb(){var b=document.getElementById('bsend');if(b)b.disabled=!(S.ct.name&&S.ct.email);}

function doSend(){
  if(!S.ct.name||!S.ct.email)return;
  var btn=document.getElementById('bsend');if(btn){btn.disabled=true;btn.textContent='Envoi...';}
  var lignesText='';
  if(S.result&&S.result.lignes){for(var i=0;i<S.result.lignes.length;i++){var l=S.result.lignes[i];lignesText+=l.label+': '+(l.ht>0?l.ht.toLocaleString('fr-FR')+' euros':'Inclus')+'\n';}}
  fetch('https://formspree.io/f/mojyeynr',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({nom:S.ct.name,email:S.ct.email,telephone:S.ct.phone||'',message:S.ct.msg||'',type_projet:S.ptype,description:S.desc||'',total_ttc:(S.result?S.result.total_ttc:'')+'€',detail:lignesText})})
  .then(function(res){if(res.ok){S.contactSent=true;render();}else{throw new Error();}})
  .catch(function(){alert('Erreur envoi.');if(btn){btn.disabled=false;btn.textContent='Envoyer ma demande';}});
}

function raz(){
  S={step:1,ptype:'',desc:'',duree:'',nbVideos:'1',lieux:'',contenu:'',style:'',soustitres:false,drone:false,photo:false,photoH:'2',cadreur:false,cadreurDur:'0.5',photoDur:'2',photoStyle:'',dist:'',deliv:[],result:null,contactSent:false,loading:false,ct:{name:'',email:'',phone:'',msg:''}};
  render();
}
render();
</script>
</body>
</html>
